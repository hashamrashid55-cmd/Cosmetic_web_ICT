<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Background and Text Color</title>
</head>
<body>

<h3>Click the button to change the background and text color</h3>

<button id="changeColorButton" , onclick="changeColors()">Click Me</button>

<script>

  function changeColors() {
    document.getElementById('changeColorButton').style.backgroundColor = '#ff6347';  // tomato color

    document.getElementById('changeColorButton').style.color = '#fff';  // white text
  }

</script>

</body>
</html>
